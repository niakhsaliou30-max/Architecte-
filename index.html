<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Agence d'Architecture</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        header {
            background: #111;
            color: white;
            padding: 20px;
            text-align: center;
        }
        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        .hero {
            background: url('https://images.unsplash.com/photo-1503387762-592deb58ef4e') no-repeat center/cover;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 30px;
        }
        .section {
            padding: 40px;
            text-align: center;
        }
        .projects {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            width: 250px;
            margin: 10px;
            border: 1px solid #ccc;
            border-radius: 10px;
            overflow: hidden;
        }
        .card img {
            width: 100%;
        }
        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

<header>
    <h1>Mon Agence d’Architecture</h1>
    <p>Design moderne & innovation</p>
</header>

<nav>
    <a href="#">Accueil</a>
    <a href="#">Projets</a>
    <a href="#">Contact</a>
</nav>

<div class="hero">
    Construisons vos rêves
</div>

<div class="section">
    <h2>Nos Projets</h2>
    <div class="projects">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511">
            <p>Maison moderne</p>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1494526585095-c41746248156">
            <p>Immeuble urbain</p>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1487958449943-2429e8be8625">
            <p>Villa luxe</p>
        </div>
    </div>
</div>

<div class="section">
    <h2>Contact</h2>
    <p>Email : contact@architecture.com</p>
</div>

<footer>
    <p>© 2026 Mon Agence d’Architecture</p>
</footer>

</body>
</html>
